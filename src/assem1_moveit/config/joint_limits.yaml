# هيكلية باندا لضمان استقرار حركة الروبوت assem1
default_velocity_scaling_factor: 0.1
default_acceleration_scaling_factor: 0.1

joint_limits:
  joint_1:
    has_velocity_limits: true
    max_velocity: 1.0        # تأكد من الـ .0
    has_acceleration_limits: true
    max_acceleration: 1.0    # باندا بيفضل تفعيلها لضمان نعومة الحركة
  joint_2:
    has_velocity_limits: true
    max_velocity: 1.0
    has_acceleration_limits: true
    max_acceleration: 1.0